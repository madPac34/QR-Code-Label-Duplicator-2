# labelclone configuration file
# Location: /etc/labelclone/labelclone.conf
# All settings are optional – defaults are used for missing keys.

[labelclone]

# ── Device paths ─────────────────────────────────────────────────────────────
# Stable symlinks created by the udev rules installed by install.sh.
# If a symlink does not exist the service auto-detects the device.

scanner_symlink = /dev/labelclone-scanner
printer_symlink = /dev/labelclone-printer

# ── Keyboard layout ───────────────────────────────────────────────────────────
# "de" (German QWERTZ, default) or "us" (US QWERTY)
# Must match the HID layout reported by the scanner.

keyboard_layout = de

# ── Duplicate suppression ─────────────────────────────────────────────────────
# Scanning the same code again within this many seconds is silently ignored.

duplicate_window_seconds = 0.5

# ── Label geometry ────────────────────────────────────────────────────────────
# Values for a 203 dpi (8 dpmm) printer with 4 × 2 inch labels.
# For 300 dpi / 12 dpmm multiply dot values by 1.5 and set label_dpmm = 12.

label_width_dots  = 600   # 50 mm × 12 dpmm  (TC300 @ 300 dpi)
label_height_dots = 456   # 38 mm × 12 dpmm  (TC300 @ 300 dpi)
label_dpmm        = 12

# ── Print settings ────────────────────────────────────────────────────────────
print_speed    = 4      # 1–14 (IPS); printer-model dependent
print_darkness = 28     # 0–30

# ── QR code ───────────────────────────────────────────────────────────────────
qr_magnification = 5    # suits 300 dpi; increase if QR reads poorly
qr_model         = 2    # 1 = original QR, 2 = enhanced QR (recommended)
